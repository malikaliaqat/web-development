.Github_button::before {
  content: "";
  position: absolute;
  top: 0;
  left: -75%;
  width: 50%;
  height: 100%;
  background: rgba(255, 255, 255, 0.6);
  transform: skewX(-25deg);
}
  .Github_button:hover::before {
  animation: shine 2s forwards;
}

/* keyframes for shine */

  0% { left: -75%; }
  100% { left: 125%; }
